# MERFISH mouse hypothalamus (Moffitt et al. 2018) — CELL-TYPE prediction.
# Same agent, different label vocabulary + KB. Proves the config-driven design
# generalizes beyond cortical layers. Mouse data -> no PHI.

provider: anthropic           # anthropic | openai | ollama
model: claude-sonnet-4-6      # cheaper default; swap to claude-opus-4-8 for the final benchmark
thinking: null                # off for a lean ~90s run; set "adaptive" for max quality
effort: medium

species: mouse
tissue: hypothalamus (MERFISH)

label_vocabulary: [Excitatory, Inhibitory, Astrocyte, Oligodendrocyte, Endothelial, Microglia, Ependymal, Pericytes]

# Cell types are not a spatial stack — no adjacency constraints.
adjacency: {}
adjacent_partial_credit: 0.0

marker_kb: data/kb/mouse_celltype_markers.json
fixtures: data/fixtures/merfish

# CellMarker 2.0 SQLite index for the Critic's confounder_lookup tool.
cellmarker_db: data/kb/cellmarker.db

# UniProt protein-annotation lookup for the Critic (taxon from species=mouse).
uniprot:
  enabled: true
  source: uniprot
  cache_dir: data/uniprotcache/merfish

# Live PubMed literature search + persistent cache (see configs/dlpfc.yaml for notes).
literature:
  enabled: true
  source: pubmed
  cache_dir: data/litcache/merfish
  top_k: 4
  as_of: "2026-06-01"
  ncbi_api_key_env: NCBI_API_KEY

# Inherit the centralized ACTOR-CRITIC system prompt (agent/prompts.py).
system_prompt: null
